<!DOCTYPE html>
<html>
<head>
<title>Secret Holi Surprise 🌸</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  text-align: center;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #ffd6e8, #ffeaa7, #dff9fb, #fab1a0);
  background-size: 400% 400%;
  animation: bgMove 10s ease infinite;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

#loginBox {
  margin-top: 20%;
}

input {
  padding: 12px;
  border-radius: 25px;
  border: none;
  text-align: center;
  width: 200px;
}

button {
  padding: 10px 20px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  margin-top: 10px;
  background: #ff9ff3;
  color: white;
  font-weight: bold;
}

#finalMessage {
  display: none;
  margin-top: 15%;
  font-size: 24px;
  color: #6c5ce7;
}

/* Gulaal + confetti */
.particle {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  animation: fall linear infinite;
}

@keyframes fall {
  from { transform: translateY(-10px); }
  to { transform: translateY(100vh); }
}
</style>
</head>
<body>

<div id="loginBox">
  <h2>🌸 Unlock Your Holi Surprise 🌸</h2>
  <input type="password" id="password" placeholder="Enter your secret code">
  <br>
  <button onclick="checkPassword()">Unlock 💖</button>
</div>

<div id="finalMessage"></div>

<audio id="music" loop>
  <source src="holi.mp3" type="audio/mpeg">
</audio>

<script>

const users = {
  "nidhi": {
    year: "2022",
    msg: "Hey! Jee partner, From first lecture chaos to lifelong madness 💃🔥"
  },
  "shruti": {
    year: "2024",
    msg: "You turned random hostel days into core memories 🌈✨"
  },
  "suman": {
    year: "2024",
    msg: "Hopefully someday we will get chhutti same day to travel together🌈✨"
  },
  "surbhi": {
    year: "2024",
    msg: "To the ones who survived my legendary bad pasta and still chose to be my friends 🍝💀🌈"
  },
  "tanisha": {
    year: "2024",
    msg: "You all trusted me in the kitchen once with the pasta… never again 😭🔥"
  },
  "saksham": {
    year: "2024",
    msg: "looking forward to more trips and more washroom finds😌"
  },
   "anuj": {
    year: "2024",
    msg: "(PPP)! Full form - Pizza🍕 Party Pending till then:  "
  },
   "rishav": {
    year: "2024",
    msg: "That pasta night was a disaster…But the laughter? Iconic, to the ones who turned my kitchen fail into a core memory 🍝🎬🌈"
  },
   "deepak": {
    year: "2024",
    msg: "hey! Camera person of the group... next trip pe DSLR pakka I'll bring😌"
  },
  "smitashya": {
    year: "2024",
    msg: "OG energy since day one😌"
  },
  "ravi": {
    year: "2024",
    msg: "a little secret: U R the best dancer among the boys in group😌"
  }
};

function checkPassword() {
  const pass = document.getElementById("password").value.toLowerCase();
  const finalDiv = document.getElementById("finalMessage");

  if(users[pass]) {

    const year = prompt("What year did we meet? 👀");

if(!year) {
  alert("Don't run away bestie 😌 Try again!");
  return;
}

    if(year !== users[pass].year) {
     document.body.style.background = "red";
alert("ACCESS DENIED 🚨 Fake friend detected 😂");
location.reload();
      return;
    }

    document.getElementById("loginBox").style.display = "none";
    finalDiv.style.display = "block";

    finalDiv.innerHTML = `
      <h1>🎉 Happy Holi ${pass.charAt(0).toUpperCase() + pass.slice(1)} 🎉</h1>
      <p>${users[pass].msg}</p>
      <p>Stay colorful & chaotic always 🌈✨</p>
    `;

    const music = document.getElementById("music");
    music.volume = 0.7;
    music.play();

    startParticles();

  } else {
    alert("Wrong password bestie 😌");
  }
}

function startParticles() {
  for(let i=0; i<150; i++) {
    let particle = document.createElement("div");
    particle.className = "particle";
    particle.style.left = Math.random() * 100 + "vw";
    particle.style.animationDuration = (Math.random() * 3 + 2) + "s";
    particle.style.backgroundColor = randomColor();
    document.body.appendChild(particle);
  }
}

function randomColor() {
  const colors = ["#ff6b81","#ff9ff3","#feca57","#48dbfb","#1dd1a1","#ffb8b8"];
  return colors[Math.floor(Math.random() * colors.length)];
}

</script>
</body>
</html>
